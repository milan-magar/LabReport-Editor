<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoverCraft Studio | Upload Image · Fixed TOC Spacing</title>
  <script src="https://unpkg.com/docx@8.5.0/build/index.umd.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #faf9f6;
      --accent: #2c5f8a;
      --toolbar-bg: #0f1623;
      --toolbar-border: rgba(255,255,255,0.07);
      --page-shadow: 0 6px 30px rgba(0,0,0,0.2), 0 1px 4px rgba(0,0,0,0.1);
      --mg: rgba(180,83,9,0.18);
    }
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #1e2635;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--toolbar-border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .toolbar-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.45rem 1.2rem;
      border-bottom: 1px solid var(--toolbar-border);
    }
    .toolbar-brand { font-family: 'DM Serif Display', serif; color: white; font-size: 1rem; }
    .toolbar-meta  { font-size: 0.67rem; color: rgba(255,255,255,0.35); }
    .toolbar-row {
      display: flex;
      align-items: center;
      gap: 0.1rem;
      padding: 0.3rem 1rem;
      flex-wrap: wrap;
    }
    .tb-sep { width:1px; height:20px; background:rgba(255,255,255,0.12); margin:0 0.3rem; flex-shrink:0; }
    .tb-btn {
      background: transparent; border: none;
      color: rgba(255,255,255,0.72);
      padding: 0.26rem 0.55rem; border-radius: 0.3rem;
      cursor: pointer; font-size: 0.79rem;
      font-family: 'DM Sans', sans-serif;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
      display: flex; align-items: center; gap: 0.22rem;
    }
    .tb-btn:hover { background: rgba(255,255,255,0.1); color: white; }
    .tb-btn.accent { background: var(--accent); color: white; }
    .tb-btn.accent:hover { background: #1e4a70; }
    .tb-btn.green  { background: #1a5c3a; color: white; }
    .tb-btn.green:hover { background: #144830; }
    .tb-select {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.72);
      padding: 0.26rem 0.5rem; border-radius: 0.3rem;
      font-size: 0.79rem; font-family: 'DM Sans', sans-serif; cursor: pointer;
    }
    .tb-select option { background: #1a2030; }

    .canvas {
      flex: 1; overflow-y: auto;
      padding: 2rem 2rem 4rem;
      display: flex; flex-direction: column; align-items: center;
    }
    .canvas::-webkit-scrollbar { width: 7px; }
    .canvas::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }

    .page-wrapper { display: flex; flex-direction: column; align-items: center; }
    .page-label {
      font-size: 0.62rem; color: rgba(255,255,255,0.25);
      margin: 1.3rem 0 0.35rem;
      letter-spacing: 0.07em; text-transform: uppercase;
    }

    .page {
      width: 794px;
      min-height: 1123px;
      background: var(--paper);
      box-shadow: var(--page-shadow);
      border-radius: 2px;
      display: grid;
      grid-template-rows: 96px 1fr 96px;
      position: relative;
      transition: box-shadow 0.2s;
      overflow: hidden;
    }
    .page.focused { box-shadow: var(--page-shadow), 0 0 0 2px rgba(44,95,138,0.5); }

    .page::before {
      content: '';
      position: absolute;
      top: 96px; left: 0; right: 0;
      height: 1px;
      background: var(--mg);
      pointer-events: none;
      z-index: 2;
    }
    .page::after {
      content: '';
      position: absolute;
      bottom: 96px; left: 0; right: 0;
      height: 1px;
      background: var(--mg);
      pointer-events: none;
      z-index: 2;
    }
    .margin-left, .margin-right {
      position: absolute;
      top: 0; bottom: 0;
      width: 1px;
      background: var(--mg);
      pointer-events: none;
      z-index: 2;
    }
    .margin-left  { left: 120px; }
    .margin-right { right: 120px; }

    .page-header { padding: 0 120px; display:flex; align-items:flex-end; }
    .page-body   { padding: 0 120px; overflow: hidden; position: relative; }
    .page-footer { padding: 0 120px; display:flex; align-items:flex-start; padding-top:6px; }

    .page-num-display {
      margin-left: auto;
      font-family: 'Times New Roman', serif;
      font-size: 10pt; color: #555;
    }

    .page-editable {
      width: 100%; min-height: 931px; height: 100%;
      outline: none;
      font-family: 'Times New Roman', Times, serif;
      font-size: 14pt; line-height: 1.5;
      color: #111; caret-color: #2c5f8a;
    }
    .page-editable img {
      max-width: 100%;
      height: auto;
      margin: 0.5rem 0;
      display: block;
    }
    .page-editable h1 { font-size:18pt; font-weight:bold; margin:0.5rem 0 0.3rem; }
    .page-editable h2 { font-size:16pt; font-weight:bold; margin:0.45rem 0 0.25rem; }
    .page-editable h3 { font-size:14pt; font-weight:bold; margin:0.4rem 0 0.2rem; }
    .page-editable p  { font-size:14pt; margin:0.25rem 0; }
    .page-editable ul { margin:0.25rem 0 0.25rem 1.4rem; }
    .page-editable li { font-size:14pt; margin:0.15rem 0; }
    .page-editable table { border-collapse:collapse; width:100%; margin:0.4rem 0; }
    .page-editable th, .page-editable td  { border:1px solid #000; padding:0.3rem 0.4rem; font-size:14pt; }

    .overflow-line {
      position: absolute; bottom:0; left:0; right:0; height:2px;
      background: repeating-linear-gradient(90deg,#b45309 0,#b45309 8px,transparent 8px,transparent 14px);
      opacity:0; transition:opacity 0.3s; pointer-events:none;
    }
    .overflow-line.show { opacity:1; }

    /* TOC styles — fixed spacing: no extra margin before H2/H3 */
    .toc-wrap {
      font-family: 'Times New Roman', Times, serif;
      width: 100%;
    }
    .toc-wrap h1 {
      font-size: 18pt;
      font-weight: bold;
      margin: 0.75rem 0 1rem 0;
      padding-bottom: 0.2rem;
      border-bottom: 1px solid #111;
    }
    .toc-entry {
      display: flex;
      align-items: baseline;
      width: 100%;
      margin-bottom: 0.2rem;
      font-family: 'Times New Roman', Times, serif;
      font-size: 14pt;
      line-height: 1.4;
    }
    .toc-entry.lv1 { 
      font-weight: bold; 
      margin-top: 0.3rem;
      font-size: 14pt;
      margin-bottom: 0.1rem;
    }
    .toc-entry.lv2, .toc-entry.lv3 {
      margin-top: 0;
      margin-bottom: 0.15rem;
    }
    .toc-entry.lv2 { 
      font-weight: normal; 
      padding-left: 1.4rem; 
    }
    .toc-entry.lv3 { 
      font-weight: normal; 
      padding-left: 2.6rem; 
    }
    .toc-text {
      white-space: nowrap;
      overflow: hidden;
      flex-shrink: 1;
      max-width: 65%;
      text-overflow: ellipsis;
    }
    .toc-dots {
      flex: 1;
      text-align: right;
      white-space: nowrap;
      overflow-x: hidden;
      letter-spacing: 1px;
      font-size: 14pt;
      color: #111;
      margin: 0 0.2rem;
    }
    .toc-pg {
      font-size: 14pt;
      white-space: nowrap;
      flex-shrink: 0;
      text-align: right;
      margin-left: 0.25rem;
    }
    .toc-spacer {
      height: 0.6rem;
      width: 100%;
    }

    .page-controls { display:flex; gap:0.4rem; margin-top:0.35rem; margin-bottom:0.15rem; }
    .pg-ctrl {
      background: rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.4); border-radius:0.35rem;
      padding:0.2rem 0.6rem; font-size:0.65rem; cursor:pointer;
      font-family:'DM Sans',sans-serif; transition:all 0.15s;
    }
    .pg-ctrl:hover { background:rgba(255,255,255,0.1); color:white; }
    .pg-ctrl.danger:hover { background:rgba(180,40,40,0.3); color:#ffbbbb; border-color:rgba(180,40,40,0.4); }

    .add-between {
      width:794px; display:flex; align-items:center; gap:0.5rem;
      opacity:0; transition:opacity 0.2s; margin:0.25rem 0;
    }
    .add-between:hover { opacity:1; }
    .add-between .abl { flex:1; height:1px; background:rgba(255,255,255,0.1); }
    .add-between button {
      background:rgba(44,95,138,0.2); border:1px dashed rgba(44,95,138,0.5);
      color:rgba(255,255,255,0.55); border-radius:2rem;
      padding:0.17rem 0.75rem; font-size:0.66rem; cursor:pointer;
      font-family:'DM Sans',sans-serif; transition:all 0.15s; white-space:nowrap;
    }
    .add-between button:hover { background:rgba(44,95,138,0.45); color:white; }

    .toast {
      position:fixed; bottom:1.4rem; left:50%;
      transform:translateX(-50%);
      background:#0f1623; color:white;
      border:1px solid rgba(255,255,255,0.1);
      padding:0.45rem 1.2rem; border-radius:2rem;
      font-size:0.78rem; z-index:999; pointer-events:none;
      box-shadow:0 6px 18px rgba(0,0,0,0.3);
      animation:toastIn 0.18s ease;
    }
    @keyframes toastIn {
      from{opacity:0;transform:translateX(-50%) translateY(6px);}
      to  {opacity:1;transform:translateX(-50%) translateY(0);}
    }
  </style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-top">
    <div>
      <div class="toolbar-brand">📄 CoverCraft Studio</div>
      <div class="toolbar-meta">Times New Roman · A4 · Fixed TOC spacing · Upload Image</div>
    </div>
    <div style="display:flex;gap:0.45rem;align-items:center;">
      <button class="tb-btn green"  id="btnInsertTOC">📑 Insert TOC</button>
      <button class="tb-btn accent" id="btnRefreshTOC">🔄 Refresh TOC</button>
      <button class="tb-btn accent" id="btnAddPage">＋ Add Page</button>
      <button class="tb-btn" id="btnUploadImage">📤 Upload Image</button>
      <button class="tb-btn green"  id="exportDocxBtn">📝 Export DOCX</button>
    </div>
  </div>
  <div class="toolbar-row">
    <button class="tb-btn" id="btnH1"><b>H1</b> Heading 1</button>
    <button class="tb-btn" id="btnH2"><b>H2</b> Heading 2</button>
    <button class="tb-btn" id="btnH3"><b>H3</b> Heading 3</button>
    <button class="tb-btn" id="btnP">¶ Para</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btnBold"><b>B</b></button>
    <button class="tb-btn" id="btnItalic"><i>I</i></button>
    <button class="tb-btn" id="btnUnderline"><u>U</u></button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btnJustify">📏 Justify</button>
    <div class="tb-sep"></div>
    <select class="tb-select" id="fontSizeSelect">
      <option value="14" selected>14 pt</option>
      <option value="16">16 pt</option>
      <option value="18">18 pt</option>
      <option value="20">20 pt</option>
      <option value="24">24 pt</option>
    </select>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btnAlignLeft">⬅ Left</button>
    <button class="tb-btn" id="btnAlignCenter">⬌ Center</button>
    <button class="tb-btn" id="btnAlignRight">➡ Right</button>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btnBulletList">• List</button>
    <button class="tb-btn" id="btnTable">▦ Table</button>
  </div>
</div>

<div class="canvas" id="canvas"></div>

<script>
(function () {
  const canvas = document.getElementById('canvas');
  let pages = [];
  let pageCounter = 0;
  let lastFocused = null;
  const CONTENT_H = 931;

  function toast(msg, bg='#0f1623') {
    document.querySelectorAll('.toast').forEach(t=>t.remove());
    const t=document.createElement('div');
    t.className='toast'; t.textContent=msg; t.style.background=bg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3000);
  }

  function getFocused() { return lastFocused?.isConnected ? lastFocused : null; }
  function execCmd(cmd,val=null){const f=getFocused();if(!f)return;f.focus();document.execCommand(cmd,false,val);}
  function fmtBlock(tag){const f=getFocused();if(!f)return;f.focus();document.execCommand('formatBlock',false,tag);}

  /* collect headings from content pages */
  function collectAllEntries() {
    const result = [];
    pages.forEach((p, pi) => {
      if (p.isToc) return;
      p.editable.querySelectorAll('h1, h2, h3').forEach(h => {
        const level = h.tagName.toLowerCase();
        const text = h.innerText.trim() || '(untitled)';
        result.push({ level, text, pageNum: pi + 1 });
      });
    });
    return result;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function getDotLeader() {
    return '..................................................' +
           '..................................................' +
           '..................................................';
  }

  /* build TOC with spacing only before H1 (except first), no extra before H2/H3 */
  function buildTocHTML() {
    const entries = collectAllEntries();
    let html = `<div class="toc-wrap">`;
    html += `<h1>Table of Contents</h1>`;
    
    if (entries.length === 0) {
      html += `<div style="font-size:14pt; color:#888; padding:0.8rem 0; font-family:'Times New Roman',serif;">
        No headings found. Add H1, H2, or H3 headings to your content pages.</div>`;
    } else {
      let firstH1Seen = false;
      entries.forEach(e => {
        let cls = 'lv1';
        if (e.level === 'h1') cls = 'lv1';
        else if (e.level === 'h2') cls = 'lv2';
        else if (e.level === 'h3') cls = 'lv3';
        
        // Add spacer before H1 entries (except the first)
        if (e.level === 'h1' && firstH1Seen) {
          html += `<div class="toc-spacer"></div>`;
        }
        if (e.level === 'h1') firstH1Seen = true;
        
        const dots = getDotLeader();
        html += `<div class="toc-entry ${cls}">
          <span class="toc-text">${esc(e.text)}</span>
          <span class="toc-dots">${dots}</span>
          <span class="toc-pg">${e.pageNum}</span>
        </div>`;
      });
    }
    html += `</div>`;
    return html;
  }

  function addMarginLines(pageEl) {
    const ml = document.createElement('div'); ml.className='margin-left';
    const mr = document.createElement('div'); mr.className='margin-right';
    pageEl.appendChild(ml);
    pageEl.appendChild(mr);
  }

  function createPage(insertAfterIndex=null) {
    pageCounter++;
    const id = pageCounter;
    const wrapper = document.createElement('div');
    wrapper.className='page-wrapper'; wrapper.dataset.pid=id;
    const label = document.createElement('div'); label.className='page-label';
    const page = document.createElement('div'); page.className='page';
    addMarginLines(page);
    const hdr = document.createElement('div'); hdr.className='page-header';
    const body = document.createElement('div'); body.className='page-body';
    const ed = document.createElement('div');
    ed.className='page-editable'; ed.contentEditable='true'; ed.spellcheck=true;
    const ovfl = document.createElement('div'); ovfl.className='overflow-line';
    const ftr = document.createElement('div'); ftr.className='page-footer';
    const pnum = document.createElement('div'); pnum.className='page-num-display';
    ftr.appendChild(pnum);
    body.appendChild(ed); body.appendChild(ovfl);
    page.appendChild(hdr); page.appendChild(body); page.appendChild(ftr);
    const ctrl = document.createElement('div'); ctrl.className='page-controls';
    const del = document.createElement('button'); del.className='pg-ctrl danger';
    del.textContent='🗑 Delete page'; del.onclick=()=>deletePage(id);
    ctrl.appendChild(del);
    wrapper.appendChild(label); wrapper.appendChild(page); wrapper.appendChild(ctrl);
    ed.addEventListener('focus',()=>{
      lastFocused=ed;
      document.querySelectorAll('.page').forEach(p=>p.classList.remove('focused'));
      page.classList.add('focused');
    });
    ed.addEventListener('input',()=>{
      ovfl.classList.toggle('show', ed.scrollHeight>CONTENT_H+10);
    });
    const obj={id,wrapper,page,editable:ed,pnum,isToc:false};
    insertPageObj(obj, insertAfterIndex);
    renumber();
    return obj;
  }

  function createTocPage() {
    pageCounter++;
    const id = pageCounter;
    const wrapper = document.createElement('div');
    wrapper.className='page-wrapper'; wrapper.dataset.pid=id;
    const label = document.createElement('div'); label.className='page-label';
    const page = document.createElement('div'); page.className='page';
    addMarginLines(page);
    const hdr = document.createElement('div'); hdr.className='page-header';
    const body = document.createElement('div'); body.className='page-body';
    const tocEl = document.createElement('div');
    tocEl.className='page-editable';
    tocEl.contentEditable='true';
    const ftr = document.createElement('div'); ftr.className='page-footer';
    const pnum = document.createElement('div'); pnum.className='page-num-display';
    ftr.appendChild(pnum);
    body.appendChild(tocEl);
    page.appendChild(hdr); page.appendChild(body); page.appendChild(ftr);
    const ctrl = document.createElement('div'); ctrl.className='page-controls';
    const del = document.createElement('button'); del.className='pg-ctrl danger';
    del.textContent='🗑 Delete TOC page'; del.onclick=()=>deletePage(id);
    ctrl.appendChild(del);
    wrapper.appendChild(label); wrapper.appendChild(page); wrapper.appendChild(ctrl);
    const obj={id,wrapper,page,editable:tocEl,pnum,isToc:true};
    pages.unshift(obj);
    const firstEl = canvas.firstChild;
    const ab = mkAddBetween();
    canvas.insertBefore(wrapper, firstEl);
    canvas.insertBefore(ab, wrapper.nextSibling);
    renumber();
    tocEl.innerHTML = buildTocHTML();
    return obj;
  }

  function insertPageObj(obj, insertAfterIndex) {
    if (insertAfterIndex===null || insertAfterIndex>=pages.length-1) {
      pages.push(obj);
      canvas.appendChild(mkAddBetween());
      canvas.appendChild(obj.wrapper);
    } else {
      const ref=pages[insertAfterIndex];
      pages.splice(insertAfterIndex+1,0,obj);
      const refNext=ref.wrapper.nextSibling;
      const ab=mkAddBetween();
      if(refNext?.nextSibling){
        canvas.insertBefore(obj.wrapper, refNext.nextSibling);
        canvas.insertBefore(ab, obj.wrapper);
      } else {
        canvas.appendChild(ab);
        canvas.appendChild(obj.wrapper);
      }
    }
  }

  function mkAddBetween() {
    const div=document.createElement('div'); div.className='add-between';
    div.innerHTML=`<div class="abl"></div><button>＋ insert page here</button><div class="abl"></div>`;
    div.querySelector('button').onclick=()=>{
      const prev=div.previousSibling;
      let idx=pages.length-1;
      if(prev?.dataset?.pid){
        const f=pages.findIndex(p=>p.id===parseInt(prev.dataset.pid));
        if(f!==-1) idx=f;
      }
      createPage(idx);
      toast('✦ Page inserted');
    };
    return div;
  }

  function deletePage(id) {
    if(pages.length<=1){toast('⚠ Must keep at least one page');return;}
    const idx=pages.findIndex(p=>p.id===id);
    if(idx===-1)return;
    const prev=pages[idx].wrapper.previousSibling;
    if(prev?.classList?.contains('add-between')) prev.remove();
    pages[idx].wrapper.remove();
    pages.splice(idx,1);
    renumber();
    toast('🗑 Page deleted');
  }

  function renumber() {
    pages.forEach((p,i)=>{
      p.pnum.textContent = i+1;
      p.wrapper.querySelector('.page-label').textContent = `— Page ${i+1} of ${pages.length} —`;
    });
    const tocPage = pages.find(p => p.isToc);
    if (tocPage && tocPage.editable) {
      tocPage.editable.innerHTML = buildTocHTML();
    }
  }

  function insertTOC() {
    const existing = pages.find(p=>p.isToc);
    if (existing) {
      const confirmReplace = confirm("Replace current Table of Contents with auto-generated version? (Your manual edits will be lost)");
      if (!confirmReplace) {
        toast("TOC not changed – manual edits kept", "#1a5c3a");
        return;
      }
      existing.editable.innerHTML = buildTocHTML();
      toast('📑 TOC regenerated (fixed spacing before H2/H3)');
    } else {
      createTocPage();
      toast('📑 TOC page inserted (no extra space before H2/H3 entries)');
    }
  }

  function refreshTOC() {
    const existing = pages.find(p=>p.isToc);
    if (!existing) {
      toast("⚠ No TOC page exists. Use 'Insert TOC' first.", "#a03e2c");
      return;
    }
    existing.editable.innerHTML = buildTocHTML();
    toast('🔄 TOC refreshed — spacing corrected');
  }

  function insertTable() {
    const r=parseInt(prompt('Rows:','3')||'3');
    const c=parseInt(prompt('Columns:','3')||'3');
    let h='<table border="1" style="border-collapse:collapse;width:100%">';
    for(let i=0;i<r;i++){h+='<tr>';for(let j=0;j<c;j++)h+='<td style="border:1px solid #000;padding:5px;">&nbsp;</td>';h+='</tr>';}
    h+='</table><p><br></p>';
    execCmd('insertHTML',h);
  }

  /* Upload image from local file (converted to base64 data URL) */
  function uploadImage() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const imgUrl = ev.target.result;
        const imgHtml = `<img src="${imgUrl}" alt="Uploaded image" style="max-width:100%; height:auto; margin:0.5rem 0;" /><br>`;
        execCmd('insertHTML', imgHtml);
        toast('🖼 Image uploaded and inserted (base64 embedded)');
      };
      reader.readAsDataURL(file);
    };
    input.click();
  }

  /* DOCX export with proper tab stops and spacing, and base64 images */
  async function exportDocx() {
    if(!window.docx){alert('docx library not loaded');return;}
    const {Document,Packer,Paragraph,TextRun,AlignmentType, TabStopType, 
           Table, TableRow, TableCell, Footer, PageNumber, ImageRun} = window.docx;
    const TOP=1440, BOT=1440, LEFT=1800, RIGHT=1800, PW=11906, PH=16838;

    // Helper to fetch base64 image data and convert to ImageRun
    async function base64ToImageRun(base64Src) {
      if (!base64Src) return null;
      try {
        // base64Src format: data:image/png;base64,xxxx
        const response = await fetch(base64Src);
        const blob = await response.blob();
        const arrayBuffer = await blob.arrayBuffer();
        const uint8Array = new Uint8Array(arrayBuffer);
        return new ImageRun({
          data: uint8Array,
          transformation: { width: 400, height: 300 }  // reasonable default, can be adjusted
        });
      } catch (err) {
        console.warn('Image conversion failed', err);
        return null;
      }
    }

    function makeTocEntry(title, pageNum, indentLeft = 0, isBold = false) {
      const rightTabPos = PW - RIGHT - 200;
      return new Paragraph({
        indent: { left: indentLeft },
        alignment: AlignmentType.LEFT,
        tabStops: [{ type: TabStopType.RIGHT, position: rightTabPos, leader: "dot" }],
        children: [
          new TextRun({ text: title, bold: isBold, font: 'Times New Roman', size: 28, color: '000000' }),
          new TextRun({ text: "\t", font: 'Times New Roman' }),
          new TextRun({ text: pageNum.toString(), bold: isBold, font: 'Times New Roman', size: 28, color: '000000' })
        ],
        spacing: { line: 340, before: 0, after: 80 }
      });
    }

    async function parseHtmlToDocx(editableDiv, isTocPage = false) {
      const container = document.createElement('div');
      container.innerHTML = editableDiv.innerHTML;
      const result = [];

      if (isTocPage && container.querySelector('.toc-wrap')) {
        const tocWrap = container.querySelector('.toc-wrap');
        const titleH1 = tocWrap.querySelector('h1');
        if (titleH1) {
          result.push(new Paragraph({
            children: [new TextRun({ text: titleH1.innerText.trim(), bold: true, font: 'Times New Roman', size: 36, color: '000000' })],
            heading: 'Heading1',
            spacing: { line: 400, before: 200, after: 200 }
          }));
        }
        const entries = tocWrap.querySelectorAll('.toc-entry');
        let prevWasH1 = false;
        for (const entry of entries) {
          const textSpan = entry.querySelector('.toc-text');
          const pgSpan = entry.querySelector('.toc-pg');
          if (!textSpan || !pgSpan) continue;
          const titleText = textSpan.innerText.trim();
          const pgNum = pgSpan.innerText.trim();
          let indent = 0;
          let isBold = false;
          if (entry.classList.contains('lv1')) { indent = 0; isBold = true; }
          else if (entry.classList.contains('lv2')) indent = 720;
          else if (entry.classList.contains('lv3')) indent = 1440;
          
          if (entry.classList.contains('lv1') && prevWasH1) {
            result.push(new Paragraph({ children: [new TextRun({ text: '', font: 'Times New Roman' })], spacing: { before: 240 } }));
          }
          if (entry.classList.contains('lv1')) prevWasH1 = true;
          
          result.push(makeTocEntry(titleText, pgNum, indent, isBold));
        }
        return result;
      }

      // Process regular content, handling images asynchronously
      const childrenToProcess = [];
      async function processNodeAsync(node) {
        if (node.nodeType === Node.TEXT_NODE && node.textContent.trim()) {
          const parent = node.parentElement;
          if (parent && ['H1','H2','H3'].includes(parent.tagName)) return;
          result.push(new Paragraph({
            children: [new TextRun({ text: node.textContent.trim(), font: 'Times New Roman', size: 28, color: '000000' })],
            spacing: { line: 360 }
          }));
          return;
        }
        if (node.nodeType !== Node.ELEMENT_NODE) return;
        const tag = node.tagName.toLowerCase();
        if (tag === 'img') {
          const src = node.getAttribute('src');
          if (src && src.startsWith('data:image')) {
            const imgRun = await base64ToImageRun(src);
            if (imgRun) {
              result.push(new Paragraph({
                children: [imgRun],
                alignment: AlignmentType.CENTER,
                spacing: { before: 200, after: 200 }
              }));
            } else {
              result.push(new Paragraph({
                children: [new TextRun({ text: `[Image could not be embedded]`, font: 'Times New Roman', size: 24, italics: true })],
                spacing: { line: 360 }
              }));
            }
          } else {
            result.push(new Paragraph({
              children: [new TextRun({ text: `[Image: ${src || 'unknown source'}`, font: 'Times New Roman', size: 24, italics: true })],
              spacing: { line: 360 }
            }));
          }
          return;
        }
        if (tag === 'h1') {
          result.push(new Paragraph({
            children: [new TextRun({ text: node.innerText.trim(), bold: true, font: 'Times New Roman', size: 36, color: '000000' })],
            heading: 'Heading1',
            spacing: { line: 400, before: 200, after: 120 }
          }));
          return;
        }
        if (tag === 'h2') {
          result.push(new Paragraph({
            children: [new TextRun({ text: node.innerText.trim(), bold: true, font: 'Times New Roman', size: 32, color: '000000' })],
            heading: 'Heading2',
            spacing: { line: 380, before: 160, after: 100 }
          }));
          return;
        }
        if (tag === 'h3') {
          result.push(new Paragraph({
            children: [new TextRun({ text: node.innerText.trim(), bold: true, font: 'Times New Roman', size: 28, color: '000000' })],
            heading: 'Heading3',
            spacing: { line: 360 }
          }));
          return;
        }
        if (tag === 'p') {
          const style = node.getAttribute('style') || '';
          let align = AlignmentType.LEFT;
          if (style.includes('center')) align = AlignmentType.CENTER;
          if (style.includes('right')) align = AlignmentType.RIGHT;
          if (style.includes('justify')) align = AlignmentType.JUSTIFIED;
          const runs = [];
          for (const c of node.childNodes) {
            if (c.nodeType === Node.TEXT_NODE && c.textContent.trim()) {
              runs.push(new TextRun({ text: c.textContent, font: 'Times New Roman', size: 28, color: '000000' }));
            } else if (c.nodeType === Node.ELEMENT_NODE) {
              const isBold = ['B','STRONG'].includes(c.tagName);
              const isItalic = ['I','EM'].includes(c.tagName);
              const isUnderline = c.tagName === 'U';
              runs.push(new TextRun({ text: c.textContent, bold: isBold, italics: isItalic, underline: isUnderline ? {} : undefined, font: 'Times New Roman', size: 28, color: '000000' }));
            }
          }
          if (runs.length === 0 && node.innerText.trim()) {
            runs.push(new TextRun({ text: node.innerText.trim(), font: 'Times New Roman', size: 28, color: '000000' }));
          }
          result.push(new Paragraph({ children: runs, alignment: align, spacing: { line: 360 } }));
          return;
        }
        if (tag === 'ul') {
          node.querySelectorAll('li').forEach(li => {
            result.push(new Paragraph({
              children: [new TextRun({ text: li.innerText.trim(), font: 'Times New Roman', size: 28, color: '000000' })],
              bullet: { level: 0 },
              spacing: { line: 360 }
            }));
          });
          return;
        }
        if (tag === 'table') {
          const rows = [];
          node.querySelectorAll('tr').forEach(tr => {
            const cells = [];
            tr.querySelectorAll('td,th').forEach(td => {
              cells.push(new TableCell({
                children: [new Paragraph({ children: [new TextRun({ text: td.innerText.trim(), font: 'Times New Roman', size: 28, color: '000000' })] })]
              }));
            });
            rows.push(new TableRow({ children: cells }));
          });
          if (rows.length) result.push(new Table({ rows: rows, width: { size: 100, type: 'pct' } }));
          return;
        }
        for (const child of node.childNodes) {
          await processNodeAsync(child);
        }
      }

      for (const child of container.childNodes) {
        await processNodeAsync(child);
      }
      if (result.length === 0) {
        result.push(new Paragraph({ children: [new TextRun({ text: '', font: 'Times New Roman' })] }));
      }
      return result;
    }

    const footer = new Footer({
      children: [new Paragraph({
        children: [new TextRun({ children: [PageNumber.CURRENT], font: 'Times New Roman', size: 22, color: '000000' })],
        alignment: AlignmentType.RIGHT
      })]
    });

    const base = { page: { size: { width: PW, height: PH, orientation: 'portrait' }, margins: { top: TOP, bottom: BOT, left: LEFT, right: RIGHT } } };
    const sections = [];
    for (let idx = 0; idx < pages.length; idx++) {
      const p = pages[idx];
      const children = await parseHtmlToDocx(p.editable, p.isToc);
      sections.push({
        properties: { ...base, type: idx === 0 ? undefined : 'nextPage' },
        footers: { default: footer },
        children: children
      });
    }

    const doc = new Document({ features: { updateFields: false }, sections });
    const blob = await Packer.toBlob(doc);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'document_upload_images.docx'; a.click();
    URL.revokeObjectURL(url);
    toast('✅ Exported — images embedded, TOC spacing fixed');
  }

  // Toolbar bindings
  document.getElementById('btnH1').onclick=()=>fmtBlock('h1');
  document.getElementById('btnH2').onclick=()=>fmtBlock('h2');
  document.getElementById('btnH3').onclick=()=>fmtBlock('h3');
  document.getElementById('btnP').onclick=()=>fmtBlock('p');
  document.getElementById('btnBold').onclick=()=>execCmd('bold');
  document.getElementById('btnItalic').onclick=()=>execCmd('italic');
  document.getElementById('btnUnderline').onclick=()=>execCmd('underline');
  document.getElementById('btnJustify').onclick=()=>execCmd('justifyFull');
  document.getElementById('btnAlignLeft').onclick=()=>execCmd('justifyLeft');
  document.getElementById('btnAlignCenter').onclick=()=>execCmd('justifyCenter');
  document.getElementById('btnAlignRight').onclick=()=>execCmd('justifyRight');
  document.getElementById('btnBulletList').onclick=()=>execCmd('insertUnorderedList');
  document.getElementById('btnTable').onclick=insertTable;
  document.getElementById('btnInsertTOC').onclick=insertTOC;
  document.getElementById('btnRefreshTOC').onclick=refreshTOC;
  document.getElementById('btnAddPage').onclick=()=>{ createPage(); toast('✦ New page added'); };
  document.getElementById('btnUploadImage').onclick=uploadImage;
  document.getElementById('exportDocxBtn').onclick=exportDocx;
  document.getElementById('fontSizeSelect').onchange=function(){
    const sel = window.getSelection();
    if(sel && !sel.isCollapsed){
      const span = document.createElement('span');
      span.style.fontSize = this.value+'pt';
      try{ sel.getRangeAt(0).surroundContents(span); }catch(e){}
    }
  };

  // Initial pages
  const p1 = createPage();
  p1.editable.innerHTML = `<h1>INTRODUCTION TO MATLAB</h1>
<p>MATLAB is a high-performance language for technical computing. This document demonstrates heading styles and table of contents with fixed spacing.</p>
<h2>Basic Plotting in MATLAB</h2>
<p>Plotting (x,y) data points and connecting them is straightforward with the <strong>plot()</strong> function.</p>
<h3>1. Plotting (x,y) and Connecting the points</h3>
<p>Use the plot() command with x and y vectors.</p>
<h3>2. Drawing the Graph of f(x) = sin x</h3>
<p>Using linspace for smooth curves over the interval [0, 2π].</p>
<h2>Plotting Conic Sections in MATLAB</h2>
<p>Circles, ellipses, parabolas, and hyperbolas can be visualized using parametric equations.</p>
<h3>Circle</h3><p>x = r·cos(t), y = r·sin(t)</p>
<h3>Ellipse</h3><p>x = a·cos(t), y = b·sin(t)</p>`;

  const p2 = createPage();
  p2.editable.innerHTML = `<h1>FUNCTIONS AND QUADRATIC EQUATIONS</h1>
<p>Solving quadratic equations, evaluating functions, and finding roots are core MATLAB tasks.</p>
<h3>Finding the Roots of f(x) = 2x²+5x+3</h3>
<p>Use the roots() function with coefficient vector [2, 5, 3].</p>
<h2>Functions and Quadratic Equations in MATLAB</h2>
<p>MATLAB provides powerful tools for working with polynomial and transcendental functions.</p>`;

  p1.editable.focus();
  lastFocused = p1.editable;
  toast('✨ Upload Image (local file) | Fixed TOC spacing | Justify & Refresh TOC');
})();
</script>
</body>
